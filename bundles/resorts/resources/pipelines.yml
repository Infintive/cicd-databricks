resources:
  pipelines:
    resorts_pipeline:
      name: ${bundle.name}_pipeline
      allow_duplicate_names: true
      tags:
        env: ${bundle.target}
        bundle: ${bundle.name}
        owner: ${workspace.current_user.userName}
      libraries:
        - glob:
            include: ../src/transformations/**
      serverless: true
      catalog: ${bundle.target}_inf
      schema: ${resources.schemas.resorts.name}
      root_path: ../src/
      configuration:
        catalog_name: ${bundle.target}_inf
        schema_name: ${resources.schemas.resorts.name}
        volume_name: ${resources.volumes.landing.name}
